<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI短剧精品展示</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100vh;
            overflow: hidden;
        }

        body {
            background: #0d0d14;
            font-family: 'Noto Sans SC', sans-serif;
            color: #F5BD20;
            padding: 20px 20px;
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            margin-bottom: 16px;
            flex-shrink: 0;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #F5BD20;
            letter-spacing: 4px;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 13px;
            color: rgba(245, 189, 32, 0.7);
            letter-spacing: 2px;
        }

        .cards-container {
            flex: 1;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
            width: 100%;
            max-width: 100%;
            overflow: hidden;
            min-height: 0;
        }

        .card {
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            border: 1px solid rgba(245, 189, 32, 0.08);
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 30px rgba(245, 189, 32, 0.08);
            border-color: rgba(245, 189, 32, 0.3);
        }

        .card-image {
            width: 100%;
            aspect-ratio: 9/16;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .card:hover .card-image img {
            transform: scale(1.05);
        }

        .play-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .card:hover .play-overlay {
            opacity: 1;
        }

        .play-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #F5BD20;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #0d0d14;
            box-shadow: 0 4px 20px rgba(245, 189, 32, 0.4);
        }

        .card-body {
            padding: 10px 12px 6px;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        .card-title {
            font-size: 14px;
            font-weight: 700;
            color: #F5BD20;
            margin-bottom: 3px;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex-shrink: 0;
        }

        .card-subtitle {
            font-size: 10px;
            color: rgba(245, 189, 32, 0.55);
            margin-bottom: 6px;
            flex-shrink: 0;
        }

        .card-stats {
            font-size: 10px;
            font-weight: 600;
            color: #F5BD20;
            background: rgba(245, 189, 32, 0.1);
            border-left: 3px solid #F5BD20;
            padding: 4px 8px;
            margin-bottom: 6px;
            border-radius: 0 4px 4px 0;
            line-height: 1.4;
            flex-shrink: 0;
        }

        .card-desc {
            font-size: 10px;
            line-height: 1.45;
            flex: 1;
            opacity: 0.85;
            min-height: 0;
        }

        .card-footer {
            padding: 4px 12px 8px;
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .tag {
            font-size: 9px;
            padding: 3px 8px;
            border-radius: 20px;
            background: rgba(245, 189, 32, 0.12);
            color: #F5BD20;
            border: 1px solid rgba(245, 189, 32, 0.25);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-bg {
            position: absolute;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(12px);
            cursor: pointer;
        }

        .modal-box {
            position: relative;
            z-index: 2;
            max-width: 92vw;
            max-height: 94vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .modal-box img {
            max-width: 92vw;
            max-height: 82vh;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            transition: opacity 0.3s ease;
        }

        .modal-loader {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 3px solid rgba(245, 189, 32, 0.2);
            border-top-color: #F5BD20;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            z-index: 3;
            pointer-events: none;
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .modal-caption {
            margin-top: 20px;
            text-align: center;
        }

        .modal-caption .name {
            color: #F5BD20;
            font-size: 22px;
            font-weight: 700;
            display: block;
            margin-bottom: 4px;
        }

        .modal-caption .role {
            color: rgba(245, 189, 32, 0.7);
            font-size: 14px;
        }

        .modal-close {
            position: absolute;
            top: -40px;
            right: 0;
            background: none;
            border: none;
            color: rgba(245, 189, 32, 0.6);
            font-size: 32px;
            cursor: pointer;
            transition: color 0.3s;
        }

        .modal-close:hover {
            color: #F5BD20;
        }

        /* 强制一排五个，不换行 */
        @media (max-width: 1200px) {
            .cards-container { grid-template-columns: repeat(5, 1fr); gap: 10px; }
            .card-body { padding: 8px 8px 4px; }
            .card-title { font-size: 12px; }
            .card-stats { font-size: 9px; padding: 3px 6px; margin-bottom: 4px; }
            .card-desc { font-size: 9px; line-height: 1.35; }
            .card-subtitle { font-size: 8px; margin-bottom: 4px; }
            .card-footer { padding: 3px 8px 6px; }
            .tag { font-size: 7px; padding: 2px 5px; }
            h1 { font-size: 24px; }
            body { padding: 12px 12px; }
        }

        @media (max-width: 900px) {
            .cards-container { grid-template-columns: repeat(5, 1fr); gap: 6px; }
            .card-body { padding: 6px 6px 2px; }
            .card-title { font-size: 10px; letter-spacing: 0; }
            .card-stats { font-size: 8px; padding: 2px 5px; margin-bottom: 3px; border-left-width: 2px; }
            .card-desc { font-size: 8px; line-height: 1.3; }
            .card-subtitle { font-size: 7px; margin-bottom: 3px; }
            .card-footer { padding: 2px 6px 4px; }
            .tag { font-size: 6px; padding: 1px 4px; }
            h1 { font-size: 20px; }
            body { padding: 8px 8px; }
            header { margin-bottom: 8px; }
            .card { border-radius: 8px; }
        }

        @media (max-width: 600px) {
            .cards-container { grid-template-columns: repeat(5, 1fr); gap: 4px; }
            .card-body { padding: 4px 4px 0; }
            .card-title { font-size: 8px; letter-spacing: 0; margin-bottom: 1px; }
            .card-stats { font-size: 6px; padding: 2px 4px; margin-bottom: 2px; border-left-width: 1px; line-height: 1.3; }
            .card-desc { font-size: 6px; line-height: 1.25; }
            .card-subtitle { font-size: 6px; margin-bottom: 2px; }
            .card-footer { padding: 1px 4px 3px; gap: 2px; }
            .tag { font-size: 5px; padding: 1px 3px; }
            h1 { font-size: 16px; }
            body { padding: 4px 4px; }
            header { margin-bottom: 4px; }
            .card { border-radius: 6px; }
            .play-icon { width: 28px; height: 28px; font-size: 12px; }
        }
    </style>
</head>

                gif: 'https://www.image2url.com/r2/default/gifs/1782912894529-a0904676-7152-4ed5-9acf-fb4150890585.gif',
                tags: ['玄幻民国'],
                bg: '#2A1A27',
                descColor: '#D1C495'
            }
        ];

        const container = document.getElementById('cardsContainer');

        cardsData.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.style.background = item.bg;
            card.innerHTML = `
                <div class="card-image">
                    <img src="${item.image}" alt="${item.title}" loading="lazy">
                    <div class="play-overlay">
                        <div class="play-icon">▶</div>
                    </div>
                </div>
                <div class="card-body">
                    <div class="card-title">${item.title}</div>
                    <div class="card-subtitle">制作方：${item.subtitle}</div>
                    <div class="card-stats">📊 ${item.stats}</div>
                    <div class="card-desc" style="color: ${item.descColor}">${item.desc}</div>
                </div>
                <div class="card-footer">
                    ${item.tags.map(t => `<span class="tag">${t}</span>`).join('')}
                </div>
            `;

            card.addEventListener('click', () => openModal(item.gif, item.title, item.subtitle));
            container.appendChild(card);
        });

        const modal = document.getElementById('modal');
        const modalImg = document.getElementById('modalImg');
        const modalCaption = document.getElementById('modalCaption');
        const modalLoader = document.getElementById('modalLoader');

        // ========== GIF 预加载 ==========
        const preloadCache = {};
        let preloadDone = false;

        function preloadGifs() {
            cardsData.forEach(item => {
                const img = new Image();
                img.src = item.gif;
                preloadCache[item.gif] = img;
            });
            // 全部加载完成后标记
            Promise.all(
                Object.values(preloadCache).map(
                    img => new Promise(resolve => {
                        if (img.complete) resolve();
                        else { img.onload = resolve; img.onerror = resolve; }
                    })
                )
            ).then(() => { preloadDone = true; });
        }

        // 页面加载时启动预加载
        preloadGifs();

        // ========== 弹窗 ==========
        function openModal(gifSrc, name, role) {
            // 显示加载状态
            modalImg.style.opacity = '0';
            modalLoader.style.display = 'block';
            modalImg.src = gifSrc;
            modalCaption.innerHTML = `
                <span class="name">${name}</span>
                <span class="role">${role}</span>
            `;
            modal.classList.add('active');

            // GIF 加载完成后显示
            const showImg = () => {
                modalImg.style.opacity = '1';
                modalLoader.style.display = 'none';
            };

            if (modalImg.complete && modalImg.naturalWidth > 0) {
                showImg();
            } else {
                modalImg.onload = showImg;
                modalImg.onerror = showImg;
            }
        }

        function closeModal() {
            modal.classList.remove('active');
            modalImg.style.opacity = '1';
            modalLoader.style.display = 'block';
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    </script>
